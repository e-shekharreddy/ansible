- name: demo on data types
  hosts: local
  connection: local
  vars:
    PROGRAM: "DevSecOps with AWS" #string
    DURATION: 143 # int/Number
    IS_LIVE: true # bool/boolean
    DETAILS: #map/dictionarty
      MONTHS: 4
      TRAINER: "SIVAKUMAR REDDY"
    TOPICS: # list starts with / or []
      - Linux
      - Shell
      - Ansible
  tasks:
  - name: print variables
    ansible.builtin.debug:
      msg: |
        Program: {{ PROGRAM }}
        Duration: {{ DURATION }}
        Is live: {{ IS_LIVE }}
        Details: {{ DETAILS }}
        Topics: {{ TOPICS }}
