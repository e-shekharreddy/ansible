- name: demo om filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible,terraform,docker
    course: "DevSecOps with AWS"
    TagsMap:
      name: ansible
      project: roboshop
      component: catalogue
    TagsList:
      [
       {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
        ]

  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi vardhan {{ GREETING | default('good evening') }}"

  - name: convert string to list 
    ansible.builtin.debug:
      msg: "{{ topics | split (',') }}"

  - name: convert map to list 
    ansible.builtin.debug:
      msg: "{{ TagsMap| dict2items }}" # items or list both are same in ansible

  - name: convert list to map
    ansible.builtin.debug:
      msg: "{{ TagsList | items2dict }}"

  - name: read students yaml
    ansible.builtin.set_fact: # setting the variable menas converting into varaible
      students_yaml: "{{ lookup('file','students.yaml') | from_yaml}}"
    
  - name: convert yaml into json
    ansible.builtin.debug:
      msg: "{{ students_yaml | to_nice_json }}" #here we can use the var:students_yaml to get proper json/yaml format output

  - name: convert uppercase into lowercase
    ansible.builtin.debug:
      msg: "{{ course | lower }}"

  - name: convert lowercase into uppercase
    ansible.builtin.debug:
      msg: "{{ course | upper }}"