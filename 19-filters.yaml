- name: demo om filters
  hosts: local
  connection: local
  vars:
    topics: linux, shell, ansible,terraform,docker
    TagsMap:
      name: ansible
      project: roboshop
      component: catalogue
    TagsList:
      [
       {
            "key": "name",
            "value": "ansible"
        },
        {
            "key": "project",
            "value": "roboshop"
        },
        {
            "key": "component",
            "value": "catalogue"
        }
        ]

  tasks:
  - name: greeting
    ansible.builtin.debug:
      msg: "Hi vardhan {{ GREETING | default('good evening') }}"

  - name: convert string to list 
    ansible.builtin.debug:
      msg: "{{ topics | split (',') }}"

  - name: convert map to list 
    ansible.builtin.debug:
      msg: "{{ TagsMap| dict2items }}" # items or list both are same in ansible

  - name: convert list to map
    ansible.builtin.debug:
      msg: "{{ TagsList | items2dict }}"