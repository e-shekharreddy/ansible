- name: install packages
  hosts: local
  connection: local
  become: yes 
  tasks:
  - name: install package
    ansible.builtin.package:
      name: "{{ item.name }}"
      state: "{{ item.state }}"
    loop: # list of map/directory
    - { name: "nginx", state: "absent" } # map/dirc
    - { name: "msql", state: "present" }
    - { name: "zip", state: "absent" }