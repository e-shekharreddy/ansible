- name: printing gathering facts ansible
  hosts: local
  connection: local
  tasks:
  - name: ansible facts
    ansible.builtin.debug:
      var: ansible_facts # here i use the var to get the output in json
  - name: check redhat or not
    ansible.builtin.debug:
      msg: "Yes,package manager is RedHAt"
    when: ansible_facts.os_family == "RedHat"

    - name: check Debian or not
    ansible.builtin.debug:
      msg: "Yes,package manager is Debian"
    when: ansible_facts.os_family == "Debian"